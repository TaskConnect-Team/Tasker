name: "Branch Merge Policy"
on:
  pull_request:
    branches:
      - main
      - dev

jobs:
  check-source-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Validate Merge into Main
        if: github.base_ref == 'main' && github.head_ref != 'dev'
        run: |
          echo "ERROR: You can only merge into 'main' from the 'dev' branch."
          exit 1

      - name: Validate Merge into Dev
        if: github.base_ref == 'dev'
        run: |
          # Check if the source branch starts with feature/, debug/, or fix/
          if [[ ! "${{ github.head_ref }}" =~ ^(feature/|debug/|fix/) ]]; then
            echo "ERROR: You can only merge into 'dev' from feature/*, debug/*, or fix/* branches."
            exit 1
          fi
